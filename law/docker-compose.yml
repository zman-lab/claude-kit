services:
  nginx:
    image: law-nginx:latest
    ports:
      - "${LAW_PORT:-7999}:80"
    depends_on:
      - backend
      - frontend
    restart: always

  backend:
    image: law-backend:latest
    environment:
      - CLAUDE_CONFIG_DIR=/root/.claude
      - DATABASE_URL=postgresql+asyncpg://law:law@postgres:5432/law
      - REDIS_URL=redis://redis:6379/0
      - AI_PROVIDER=cli
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-20250514}
      - CLAUDE_CLI_PATH=/usr/local/bin/claude
      - LAW_API_OC=${LAW_API_OC}
      - LAW_API_BASE_URL=https://www.law.go.kr/DRF
      - ROOT_PATH=/law
      - CORS_ORIGINS=["http://localhost:${LAW_PORT:-7999}"]
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-7895}
    volumes:
      - "${CLAUDE_HOME:-~/.claude}:/root/.claude:ro"
      - law-uploads:/app/uploads
      - law-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  frontend:
    image: law-frontend:latest
    environment:
      - NEXT_PUBLIC_API_URL=
    restart: always

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=law
      - POSTGRES_USER=law
      - POSTGRES_PASSWORD=law
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U law"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    restart: always

volumes:
  pgdata:
  law-uploads:
  law-logs:

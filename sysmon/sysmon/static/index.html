<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>System Monitor</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2310b981'/%3E%3Cstop offset='1' stop-color='%23059669'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='7' fill='url(%23g)'/%3E%3Cpolyline points='3,18 9,18 12,10 16,24 20,13 23,18 29,18' fill='none' stroke='%23fff' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<style>
:root{--bg:#0c0e14;--card:#151821;--border:#1e2231;--text:#e8e8ec;--dim:#6b7084;
--red:#f04e53;--orange:#f0923e;--yellow:#e8c840;--green:#3dd68c;--blue:#4d9cf0;
--purple:#9b6df0;--cyan:#3dc8d0;--pink:#e86090}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'SF Pro Display',sans-serif;background:var(--bg);color:var(--text);padding:20px 24px;line-height:1.5}

/* Header */
.hdr{display:flex;align-items:baseline;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.hdr h1{font-size:20px;font-weight:700}.hdr .spec{font-size:12px;color:var(--dim)}
.hdr .right{margin-left:auto;display:flex;align-items:center;gap:12px}
.live{font-size:12px;color:var(--green);display:flex;align-items:center;gap:5px}
.live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;transition:.15s}
.btn:hover{background:#1e2231;border-color:var(--blue)}

/* Tabs */
.tabs{display:flex;gap:2px;margin-bottom:16px}
.tab{padding:8px 20px;font-size:12px;font-weight:600;background:var(--card);border:1px solid var(--border);border-bottom:2px solid transparent;border-radius:8px 8px 0 0;cursor:pointer;color:var(--dim);transition:.15s;user-select:none}
.tab:hover{color:var(--text)}.tab.on{color:var(--text);background:#1a1e2a;border-bottom-color:var(--blue)}
.pane{display:none}.pane.on{display:block}

/* Cards */
.section{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin:20px 0 8px;display:flex;align-items:center;gap:8px}
.section::after{content:'';flex:1;height:1px;background:var(--border)}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.card-t{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--dim);margin-bottom:8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;font-weight:500;color:var(--dim);padding:6px 10px;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.04em}
td{padding:6px 10px;border-bottom:1px solid #13151d;font-variant-numeric:tabular-nums}
tr:last-child td{border-bottom:none}
.tag{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600}
.sub{font-size:11px;color:var(--dim);margin-top:2px}

/* Bars */
.bar-t{height:5px;background:#1e2231;border-radius:3px;overflow:hidden;margin-top:4px}
.bar-v{height:100%;border-radius:3px;transition:width .4s}
.bar-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.bar-label span:last-child{color:var(--dim)}

/* Charts */
.chart-wrap{position:relative;height:120px;margin-top:6px}
.chart-wrap canvas{width:100%;height:100%}
.chart-val{position:absolute;top:8px;right:12px;font-size:28px;font-weight:800;font-variant-numeric:tabular-nums}
.chart-sub{position:absolute;top:40px;right:12px;font-size:11px;color:var(--dim)}

/* Treemap grid (v2 style) */
.treemap{display:grid;grid-template-columns:repeat(36,1fr);grid-template-rows:repeat(4,1fr);gap:1px;margin-bottom:20px;height:clamp(140px,12vw,220px)}
.tm{border-radius:6px;padding:6px 8px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:visible;cursor:default;transition:filter .15s}
.tm:hover{filter:brightness(1.15)}
.tm .n{font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.tm .v{font-size:16px;font-weight:800;line-height:1.1;overflow:hidden}.tm .d{font-size:9px;opacity:.7;overflow:hidden}
.tm .tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#252836;border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:11px;white-space:nowrap;z-index:100;pointer-events:none;color:var(--text);box-shadow:0 4px 12px rgba(0,0,0,.4)}
.tm .tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#252836}
.tm:hover .tip{display:block}

/* Insight highlight box */
.insight-box{background:rgba(240,146,62,.08);border:1px solid rgba(240,146,62,.2);border-radius:8px;padding:12px 16px;margin:10px 0 18px;font-size:12px;color:var(--orange);line-height:1.6}
.insight-box strong{color:var(--yellow)}

/* Solution grid 2-col */
.sol-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sol-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.sol-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:3px 0 0 3px}
.sol-card.sev-critical::before{background:var(--red)}.sol-card.sev-warning::before{background:var(--orange)}
.sol-card.sev-info::before{background:var(--blue)}.sol-card.sev-summary::before{background:var(--green)}
.sol-card h3{font-size:13px;font-weight:700;margin-bottom:4px}
.sol-card .desc{font-size:11px;color:var(--dim);line-height:1.5;white-space:pre-line}
.sol-card .sol-acts{margin-top:8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}

/* MCP grid */
.mcp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px}
.mcp-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.mcp-card .top{display:flex;justify-content:space-between;align-items:baseline}
.mcp-card .svc{font-size:11px;font-weight:600}.mcp-card .mem{font-size:16px;font-weight:800;color:var(--red)}
.mcp-card .cnt{font-size:10px;color:var(--dim)}

/* Insights */
.ins{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;position:relative;overflow:hidden}
.ins::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%}
.ins.critical::before{background:var(--red)}.ins.warning::before{background:var(--orange)}
.ins.info::before{background:var(--blue)}.ins.summary::before{background:var(--green)}
.ins h3{font-size:13px;font-weight:700;margin-bottom:3px}
.ins .desc{font-size:11px;color:var(--dim);white-space:pre-line;line-height:1.5}
.ins .acts{margin-top:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn-act{padding:6px 14px;border-radius:6px;font-size:11px;font-weight:600;border:none;cursor:pointer;transition:.15s;background:rgba(240,78,83,.12);color:var(--red);border:1px solid rgba(240,78,83,.25)}
.btn-act:hover{background:rgba(240,78,83,.22)}
.btn-act.running{opacity:.5;pointer-events:none}
.act-effect{font-size:10px;color:var(--dim)}

/* Stacked bar */
.sbar{display:flex;height:12px;border-radius:3px;overflow:hidden;min-width:140px}

/* Modal */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(3px)}
.modal-bg.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;width:90%;max-width:520px;max-height:80vh;overflow-y:auto}
.modal h2{font-size:15px;font-weight:700;margin-bottom:10px}
.modal .log{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:'SF Mono',Menlo,monospace;font-size:11px;line-height:1.6;white-space:pre-wrap;max-height:260px;overflow-y:auto}
.modal .meta{margin-top:10px;font-size:10px;color:var(--dim);display:flex;justify-content:space-between}
.modal .btn-close{margin-top:12px;width:100%;padding:9px;background:rgba(61,214,140,.1);color:var(--green);border:1px solid rgba(61,214,140,.2);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}

/* Confirm dialog */
.confirm-body{font-size:12px;line-height:1.7;white-space:pre-line;margin:12px 0;padding:12px;background:var(--bg);border-radius:8px;border:1px solid var(--border)}
.confirm-btns{display:flex;gap:8px;margin-top:12px}
.confirm-btns .btn-cancel{flex:1;padding:9px;background:var(--card);border:1px solid var(--border);color:var(--dim);border-radius:8px;font-size:12px;cursor:pointer}
.confirm-btns .btn-go{flex:1;padding:9px;background:rgba(240,78,83,.15);color:var(--red);border:1px solid rgba(240,78,83,.3);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
.exec-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

.stat{display:flex;flex-direction:column;gap:1px}
.stat .l{font-size:10px;color:var(--dim)}.stat .v{font-size:14px;font-weight:600}

/* Session cards */
.sess-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;border-left:3px solid var(--dim)}
.sess-head{display:flex;justify-content:space-between;align-items:center}
.sess-info{display:flex;align-items:center;gap:8px}
.sess-pid{font-size:14px;font-weight:700}
.sess-meta{font-size:11px;color:var(--dim);margin-top:4px}
.sess-right{display:flex;align-items:center;gap:10px}
.sess-mem{font-size:20px;font-weight:800}
.sub-list{margin-top:10px;padding-left:16px;border-left:2px solid var(--border)}
.sub-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #13151d}
.sub-row:last-child{border-bottom:none}
.sub-left{display:flex;align-items:center;gap:6px;font-size:12px}
.sub-right{display:flex;align-items:center;gap:8px}
.zombie-card{background:var(--card);border:1px solid rgba(240,78,83,.3);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.zombie-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #13151d}
.zombie-row:last-child{border-bottom:none}
.btn-kill{padding:4px 10px;border-radius:5px;font-size:10px;font-weight:600;border:none;cursor:pointer;transition:.15s;background:rgba(240,78,83,.12);color:var(--red);border:1px solid rgba(240,78,83,.25)}
.btn-kill:hover{background:rgba(240,78,83,.22)}
.btn-kill-all{padding:6px 14px;border-radius:6px;font-size:11px;font-weight:600;border:none;cursor:pointer;transition:.15s;background:rgba(240,78,83,.15);color:var(--red);border:1px solid rgba(240,78,83,.3)}
.btn-kill-all:hover{background:rgba(240,78,83,.25)}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.status-active{background:var(--green);box-shadow:0 0 6px rgba(61,214,140,.5)}
.status-idle{background:var(--dim)}

#loading{text-align:center;padding:60px;color:var(--dim);font-size:13px}
@media(max-width:800px){.g2,.g3,.g4,.sol-grid{grid-template-columns:1fr}.treemap{display:flex;flex-wrap:wrap;height:auto}}
</style>
</head><body>

<div class="hdr">
  <h1>System Monitor</h1>
  <span class="spec" id="spec">loading...</span>
  <div class="right">
    <span style="font-size:10px;color:var(--dim)" id="poll-status">5초 전체 갱신</span>
    <button class="btn" onclick="manualRefresh()">Refresh</button>
    <span class="live" id="clock">--:--</span>
  </div>
</div>
<div class="tabs">
  <div class="tab on" onclick="tab('ov')">Overview</div>
  <div class="tab" onclick="tab('ma')">Memory Analysis</div>
  <div class="tab" onclick="tab('cs')">Claude Sessions</div>
</div>
<div id="loading">수집 중...</div>
<div class="pane on" id="p-ov"></div>
<div class="pane" id="p-ma"></div>
<div class="pane" id="p-cs"></div>

<!-- Confirm + Execute dialog (single modal, state transitions) -->
<div class="modal-bg" id="confirm"><div class="modal">
  <h2 id="c-title">실행 확인</h2>
  <!-- Phase 1: Confirm -->
  <div id="c-phase-confirm">
    <div class="confirm-body" id="c-body"></div>
    <div id="c-sudo-wrap" style="display:none;margin:10px 0">
      <label style="font-size:11px;color:var(--dim)">macOS 비밀번호 (sudo)</label>
      <input type="password" id="c-sudo-pw" placeholder="비밀번호 입력" style="width:100%;margin-top:4px;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none" autocomplete="off"/>
    </div>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">취소</button>
      <button class="btn-go" id="c-go" onclick="execConfirmed()">실행</button>
    </div>
  </div>
  <!-- Phase 2: Running -->
  <div id="c-phase-running" style="display:none;text-align:center;padding:30px 0">
    <div class="exec-spinner"></div>
    <div style="margin-top:14px;font-size:13px;color:var(--orange)">실행 중... 잠시만 기다려주세요</div>
    <div style="margin-top:6px;font-size:11px;color:var(--dim)" id="c-elapsed">0초</div>
  </div>
  <!-- Phase 3: Done -->
  <div id="c-phase-done" style="display:none">
    <div class="log" id="c-log"></div>
    <div class="meta"><span id="c-dur"></span><span id="c-time"></span></div>
    <button class="btn-close" onclick="closeConfirm()" style="margin-top:12px">닫기</button>
  </div>
</div></div>

<script>
let D=null, cpuHist=[], ramHist=[], MAX_HIST=60, pollTimer=null, pendingAction=null, fetching=false;

const TABS=['ov','ma','cs'];
function tab(id){
  const idx=TABS.indexOf(id);
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===idx));
  TABS.forEach(t=>document.getElementById('p-'+t).classList.toggle('on',t===id));
}

function pctColor(p){return p>=90?'var(--red)':p>=70?'var(--orange)':p>=50?'var(--yellow)':'var(--green)'}

// Team colors
const teamClr={board:'var(--blue)',airlock:'var(--purple)',elkhound:'var(--orange)',law:'var(--yellow)',lawear:'var(--cyan)','claude-kit':'var(--green)',sdk:'var(--pink)',unknown:'var(--dim)'};
function tc(team){return teamClr[team]||'var(--dim)'}

// Relative time from lstart string
function relTime(s){
  if(!s) return '';
  const d=new Date(s);
  if(isNaN(d)) return s;
  const diff=Math.floor((Date.now()-d)/1000);
  if(diff<60) return diff+'초 전';
  if(diff<3600) return Math.floor(diff/60)+'분 전';
  if(diff<86400) return Math.floor(diff/3600)+'시간 전';
  return Math.floor(diff/86400)+'일 전';
}
function fmtMem(mb){return mb>=1024?(mb/1024).toFixed(1)+'G':mb+'M'}

// ─── Canvas Chart ───
function drawChart(canvas, data, color, maxVal) {
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width = canvas.offsetWidth * 2;
  const H = canvas.height = canvas.offsetHeight * 2;
  ctx.clearRect(0,0,W,H);
  if(data.length<2) return;

  const pad = {t:10,b:20,l:0,r:0};
  const cw = W-pad.l-pad.r, ch = H-pad.t-pad.b;

  // Grid lines
  ctx.strokeStyle = '#1e2231'; ctx.lineWidth = 1;
  for(let i=0;i<=4;i++){
    const y = pad.t + (ch/4)*i;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
  }

  // Parse color
  const rgb = color==='var(--green)'?'61,214,140':color==='var(--red)'?'240,78,83':'240,146,62';

  // Line
  ctx.beginPath();
  ctx.strokeStyle = `rgba(${rgb},0.8)`; ctx.lineWidth = 3; ctx.lineJoin='round';
  const step = cw / (MAX_HIST-1);
  const startIdx = Math.max(0, data.length - MAX_HIST);
  for(let i=startIdx;i<data.length;i++){
    const x = pad.l + (i-startIdx)*step;
    const y = pad.t + ch - (data[i]/maxVal)*ch;
    i===startIdx ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.stroke();

  // Fill
  const lastX = pad.l + (data.length-1-startIdx)*step;
  ctx.lineTo(lastX, H-pad.b); ctx.lineTo(pad.l, H-pad.b); ctx.closePath();
  ctx.fillStyle = `rgba(${rgb},0.08)`; ctx.fill();
}

// ─── Render Overview ───
function renderOV(){
  if(!D) return;
  const m=D, c=m.cpu, mem=m.memory, dk=m.disk;
  const cpuPct = Math.round(c.user+c.sys);
  let h='';

  if(mem.pressure_pct>=90)
    h+=`<div style="background:linear-gradient(90deg,rgba(240,78,83,.1),rgba(240,78,83,.03));border:1px solid rgba(240,78,83,.2);border-radius:8px;padding:10px 16px;margin-bottom:12px;font-size:12px"><strong style="color:var(--red)">RAM ${mem.pressure_pct}%</strong> — ${mem.used_gb}G / ${mem.total_gb}G · compressor ${mem.compressed_gb}G · <span style="color:var(--dim)">Memory Analysis 탭에서 해결</span></div>`;

  // CPU + RAM charts
  h+=`<div class="g2">
    <div class="card"><div class="card-t">CPU Usage</div>
      <div class="chart-wrap"><canvas id="cv-cpu"></canvas>
        <div class="chart-val" id="cv-cpu-val" style="color:${pctColor(cpuPct)}">${cpuPct}%</div>
        <div class="chart-sub">user ${c.user}% · sys ${c.sys}%</div>
      </div></div>
    <div class="card"><div class="card-t">Memory</div>
      <div class="chart-wrap"><canvas id="cv-ram"></canvas>
        <div class="chart-val" id="cv-ram-val" style="color:${pctColor(mem.pressure_pct)}">${mem.pressure_pct}%</div>
        <div class="chart-sub">${mem.used_gb}G / ${mem.total_gb}G · comp ${mem.compressed_gb}G</div>
      </div></div>
  </div>`;

  // Grid: Disk, Load, Docker, Processes
  h+=`<div class="g4">
    <div class="card"><div class="card-t">Disk</div>
      <div style="font-size:24px;font-weight:800;color:var(--blue)">${dk.pct}%</div>
      <div class="sub">${dk.used_gb}G / ${dk.total_gb}G · ${dk.free_gb}G free</div></div>
    <div class="card"><div class="card-t">Load Avg</div>
      <div style="display:flex;gap:6px;margin-top:4px">
        <div style="flex:1;text-align:center"><div style="font-size:18px;font-weight:700;color:var(--yellow)">${c.load_1m}</div><div class="sub">1m</div></div>
        <div style="flex:1;text-align:center"><div style="font-size:18px;font-weight:700;color:var(--yellow)">${c.load_5m}</div><div class="sub">5m</div></div>
        <div style="flex:1;text-align:center"><div style="font-size:18px;font-weight:700;color:var(--yellow)">${c.load_15m}</div><div class="sub">15m</div></div>
      </div></div>
    <div class="card"><div class="card-t">Docker</div>
      <div style="font-size:24px;font-weight:800;color:var(--purple)">${m.docker.count}</div>
      <div class="sub">${m.docker.total_mb>=1024?(m.docker.total_mb/1024).toFixed(1)+' GB':m.docker.total_mb+' MB'} total</div></div>
    <div class="card"><div class="card-t">Processes</div>
      <div style="font-size:24px;font-weight:800">${c.processes}</div>
      <div class="sub">${c.threads.toLocaleString()} threads</div></div>
  </div>`;

  // Memory by category
  const cats=[{n:'MCP Servers',v:m.mcp.total_mb,c:'var(--red)',cnt:m.mcp.total_count},
    {n:'Claude CLI',v:m.claude.total_mb,c:'var(--green)',cnt:m.claude.total_count}];
  const co={security:'보안SW',chrome:'Chrome',docker:'Docker VM',warp:'Warp',ide:'IDE',system:'System',kakaotalk:'KakaoTalk',other:'기타'};
  const cc={security:'var(--purple)',chrome:'var(--cyan)',docker:'var(--blue)',warp:'var(--blue)',ide:'var(--orange)',system:'var(--yellow)',kakaotalk:'var(--pink)',other:'var(--dim)'};
  ['security','chrome','docker','warp','ide','system','kakaotalk','other'].forEach(k=>{if(m.categories[k])cats.push({n:co[k],v:m.categories[k].total_mb,c:cc[k],cnt:m.categories[k].count})});
  const mx=Math.max(...cats.map(c=>c.v));
  h+='<div class="card"><div class="card-t">Memory by Category</div>';
  cats.forEach(cat=>{
    const vt=cat.v>=1024?(cat.v/1024).toFixed(1)+' GB':cat.v+' MB';
    h+=`<div style="margin-top:6px"><div class="bar-label"><span>${cat.n} (${cat.cnt})</span><span>${vt}</span></div><div class="bar-t"><div class="bar-v" style="width:${(cat.v/mx*100)}%;background:${cat.c}"></div></div></div>`;
  });
  h+='</div>';

  document.getElementById('p-ov').innerHTML=h;
  // Draw charts after DOM update
  setTimeout(()=>{
    drawChart(document.getElementById('cv-cpu'), cpuHist, 'var(--green)', 100);
    drawChart(document.getElementById('cv-ram'), ramHist, 'var(--red)', 100);
  },50);
}

// ─── Render Analysis ───
function renderMA(){
  if(!D) return;
  const m=D, mem=m.memory, mcp=m.mcp, cl=m.claude;
  let h='';

  h+=`<div style="background:linear-gradient(90deg,rgba(240,78,83,.1),rgba(240,78,83,.03));border:1px solid rgba(240,78,83,.2);border-radius:8px;padding:10px 16px;margin-bottom:12px;font-size:12px">
    <strong style="color:var(--red)">MCP ${mcp.total_count}개</strong> = ${(mcp.total_mb/1024).toFixed(1)} GB &nbsp;·&nbsp; Claude ${cl.total_count}개 = ${(cl.total_mb/1024).toFixed(1)} GB
    <span style="float:right;color:var(--dim)">${cl.total_count} 세션 × MCP 7종 = ${mcp.total_count}개</span></div>`;

  // Treemap (v2 grid layout)
  h+='<div class="section">메모리 전체 지도 ('+mem.total_gb+' GB) — 블록 크기 = 실제 비율</div>';
  const tot=mem.total_gb, TC=36; // total grid columns
  const blocks=[
    {n:'MCP',v:mcp.total_mb/1024,c:'rgba(240,78,83,.2)',bc:'rgba(240,78,83,.35)',tc:'var(--red)',d:mcp.total_count+'개'},
    {n:'Claude',v:cl.total_mb/1024,c:'rgba(61,214,140,.15)',bc:'rgba(61,214,140,.3)',tc:'var(--green)',d:cl.total_count+'개'},
    {n:'Cache',v:mem.inactive_gb,c:'rgba(77,156,240,.1)',bc:'rgba(77,156,240,.2)',tc:'var(--blue)',d:'회수가능'},
    {n:'Wired',v:mem.wired_gb,c:'rgba(232,200,64,.12)',bc:'rgba(232,200,64,.25)',tc:'var(--yellow)',d:'커널'},
    {n:'Compressed',v:mem.compressed_gb,c:'rgba(240,146,62,.12)',bc:'rgba(240,146,62,.25)',tc:'var(--orange)',d:'RAM 부족→압축'},
  ];
  const extra=[];
  const cs2={security:['rgba(155,109,240,.12)','rgba(155,109,240,.25)','var(--purple)','보안SW'],chrome:['rgba(61,200,208,.12)','rgba(61,200,208,.25)','var(--cyan)','Chrome'],docker:['rgba(77,156,240,.12)','rgba(77,156,240,.25)','var(--blue)','Docker']};
  ['security','chrome','docker'].forEach(k=>{
    if(!m.categories[k]) return;
    const c=cs2[k]; extra.push({n:c[3],v:m.categories[k].total_mb/1024,c:c[0],bc:c[1],tc:c[2],d:''});
  });
  extra.push({n:'Free',v:mem.free_gb,c:'rgba(61,214,140,.08)',bc:'rgba(61,214,140,.15)',tc:'var(--green)',d:''});

  h+='<div class="treemap">';
  const mcpCols=Math.max(2,Math.round((blocks[0].v/tot)*TC));
  const clCols=Math.max(2,Math.round((blocks[1].v/tot)*TC));
  const rightStart=mcpCols+clCols+1;
  const cacheCols=Math.max(2,Math.round((blocks[2].v/tot)*TC));
  const wiredCols=Math.max(1,Math.round((blocks[3].v/(blocks[3].v+blocks[4].v))*cacheCols));
  const mkTip=b=>{const s=b.v>=1?b.v.toFixed(1)+'GB':(b.v*1024).toFixed(0)+'MB';return `${b.n}: ${s}${b.d?' — '+b.d:''}`;};
  const mkBlock=(b,gc,gr)=>`<div class="tm" title="${mkTip(b)}" style="grid-column:${gc};grid-row:${gr};background:${b.c};border:1px solid ${b.bc}"><div class="tip">${mkTip(b)}</div><div class="n" style="color:${b.tc}">${b.n}</div><div class="v" style="color:${b.tc}">${b.v>=1?b.v.toFixed(1)+'G':(b.v*1024).toFixed(0)+'M'}</div><div class="d">${b.d}</div></div>`;
  h+=mkBlock(blocks[0],`1/${mcpCols+1}`,'1/5');
  h+=mkBlock(blocks[1],`${mcpCols+1}/${rightStart}`,'1/5');
  h+=mkBlock(blocks[2],`${rightStart}/${rightStart+cacheCols}`,'1/3');
  h+=mkBlock(blocks[3],`${rightStart}/${rightStart+wiredCols}`,'3/5');
  h+=mkBlock(blocks[4],`${rightStart+wiredCols}/${rightStart+cacheCols}`,'3/5');
  // Extra blocks: top/bottom rows independently fill remaining columns
  const extraStart=rightStart+cacheCols;
  if(extraStart<=TC){
    if(extra.length===1){
      h+=mkBlock(extra[0],`${extraStart}/${TC+1}`,'1/5');
    } else {
      const mid=Math.ceil(extra.length/2);
      const topE=extra.slice(0,mid),botE=extra.slice(mid);
      let tc2=extraStart;
      topE.forEach((b,i)=>{let w=Math.max(1,Math.round((b.v/tot)*TC));if(i===topE.length-1)w=TC+1-tc2;if(w>0&&tc2<=TC){h+=mkBlock(b,`${tc2}/${tc2+w}`,'1/3');tc2+=w;}});
      let bc2=extraStart;
      botE.forEach((b,i)=>{let w=Math.max(1,Math.round((b.v/tot)*TC));if(i===botE.length-1)w=TC+1-bc2;if(w>0&&bc2<=TC){h+=mkBlock(b,`${bc2}/${bc2+w}`,'3/5');bc2+=w;}});
    }
  }
  h+='</div>';

  // Insight summary box (v2 style)
  if(mcp.total_count>10){
    const subMcp=(cl.sub_count*0.57).toFixed(1);
    h+=`<div class="insight-box"><strong>핵심 인사이트:</strong> Claude ${cl.total_count}개 세션이 각각 MCP 서버를 독립 스폰 → <strong>${mcp.total_count}개 프로세스</strong>가 ${(mcp.total_mb/1024).toFixed(1)}GB 차지. Claude CLI(${(cl.total_mb/1024).toFixed(1)}GB)보다 <strong>MCP가 ${(mcp.total_mb/cl.total_mb).toFixed(1)}배</strong> 더 먹음.`;
    if(cl.sub_count>3) h+=`<br>서브에이전트 ${cl.sub_count}개가 각각 MCP 풀셋 탑재. 서브에이전트 1개 = ~800MB.`;
    h+=`</div>`;
  }

  // MCP breakdown
  h+=`<div class="section">MCP 서버별 (${mcp.total_count}개, ${(mcp.total_mb/1024).toFixed(1)} GB)</div><div class="mcp-grid">`;
  const maxM=Math.max(...Object.values(mcp.breakdown).map(v=>v.total_mb));
  Object.entries(mcp.breakdown).sort((a,b)=>b[1].total_mb-a[1].total_mb).forEach(([name,info])=>{
    if(!info.count) return;
    const vt=info.total_mb>=1024?(info.total_mb/1024).toFixed(1)+'G':info.total_mb+'M';
    h+=`<div class="mcp-card"><div class="top"><span class="svc">${name}</span><span class="mem">${vt}</span></div><div class="cnt">${info.count}개</div><div class="bar-t"><div class="bar-v" style="width:${(info.total_mb/maxM*100)}%"></div></div></div>`;
  });
  h+='</div>';

  // Claude sessions
  h+=`<div class="section">Claude 세션 — 메인 ${cl.main_count}개 (터미널) + 서브에이전트 ${cl.sub_count}개 (자동생성) = ${cl.total_count}개</div><table><thead><tr><th>PID</th><th>Type</th><th>Args</th><th>Memory</th><th>Claude vs MCP</th></tr></thead><tbody>`;
  cl.sessions.forEach(s=>{
    const tc=s.type==='main'?'background:rgba(61,214,140,.15);color:var(--green)':'background:rgba(77,156,240,.12);color:var(--blue)';
    const cp=Math.round(s.rss_mb/(s.rss_mb+570)*100);
    h+=`<tr><td>${s.pid}</td><td><span class="tag" style="${tc}">${s.type}</span></td><td style="font-size:10px">${s.args||'-'}</td><td style="font-weight:600">${s.rss_mb}MB</td>
      <td><div class="sbar"><div style="width:${cp}%;background:var(--green)"></div><div style="width:${100-cp}%;background:var(--red)"></div></div></td></tr>`;
  });
  h+='</tbody></table>';

  // Insights + Solutions (v2 2-column grid)
  h+='<div class="section">해결방안 (효과순)</div>';
  h+='<div class="sol-grid">';
  m.insights.forEach(ins=>{
    h+=`<div class="sol-card sev-${ins.severity}"><h3>${ins.title}</h3><div class="desc">${ins.description}</div>`;
    if(ins.actions?.length){
      h+='<div class="sol-acts">';
      ins.actions.forEach(a=>{
        h+=`<button class="btn-act" onclick="confirmAction('${a.id}','${a.label}',\`${(a.confirm||'').replace(/`/g,"'")}\`)">
          ${a.label}</button><span class="act-effect">${a.effect}</span>`;
      });
      h+='</div>';
    }
    h+='</div>';
  });
  h+='</div>';

  document.getElementById('p-ma').innerHTML=h;
}

// ─── Render Claude Sessions ───
function renderCS(){
  if(!D||!D.claude_sessions) return;
  const cs=D.claude_sessions;
  let h='';

  // Summary cards
  h+=`<div class="g4">
    <div class="card"><div class="card-t">메인 세션</div>
      <div style="font-size:28px;font-weight:800;color:var(--green)">${cs.main_count}</div>
      <div class="sub">터미널에서 실행</div></div>
    <div class="card"><div class="card-t">서브에이전트</div>
      <div style="font-size:28px;font-weight:800;color:var(--blue)">${cs.sub_count}</div>
      <div class="sub">자동 생성</div></div>
    <div class="card"><div class="card-t">좀비</div>
      <div style="font-size:28px;font-weight:800;color:${cs.zombie_count?'var(--red)':'var(--dim)'}">${cs.zombie_count}</div>
      <div class="sub">${cs.zombie_count?'부모 없음':'없음'}</div></div>
    <div class="card"><div class="card-t">총 메모리</div>
      <div style="font-size:28px;font-weight:800;color:var(--orange)">${fmtMem(cs.total_mb)}</div>
      <div class="sub">${cs.total_count}개 프로세스</div></div>
  </div>`;

  // Main sessions with sub-agents
  if(cs.trees.length){
    h+='<div class="section">메인 세션 ('+cs.main_count+'개)</div>';
    cs.trees.forEach(m=>{
      const clr=tc(m.team);
      const dot=m.status==='active'?'status-active':'status-idle';
      h+=`<div class="sess-card" style="border-left-color:${clr}">
        <div class="sess-head">
          <div class="sess-info">
            <span class="status-dot ${dot}"></span>
            <span class="sess-pid">PID ${m.pid}</span>
            <span class="tag" style="background:${clr}20;color:${clr}">${m.team}</span>
            ${m.model?`<span style="font-size:11px;color:var(--dim)">${m.model}</span>`:''}
          </div>
          <div class="sess-right">
            <span class="sess-mem" style="color:${clr}">${fmtMem(m.total_mb)}</span>
            <button class="btn-kill-all" onclick="confirmAction('kill_claude_tree_${m.pid}','세션 종료 (PID ${m.pid})',\`메인 세션 PID ${m.pid} + 서브에이전트 ${m.sub_count}개를 모두 종료합니다.\n\n이 세션의 대화 컨텍스트가 사라집니다.\n터미널에서 해당 세션이 종료됩니다.\`)">Kill All</button>
          </div>
        </div>
        <div class="sess-meta">
          CPU ${m.cpu_pct}% · 본체 ${m.rss_mb}MB + 서브 ${m.sub_count}개 · ${relTime(m.start_time)} · <span style="font-size:10px;opacity:.7">${m.cwd}</span>
        </div>`;

      // Sub-agents
      if(m.sub_agents.length){
        h+='<div class="sub-list">';
        m.sub_agents.forEach(s=>{
          const sDot=s.status==='active'?'status-active':'status-idle';
          h+=`<div class="sub-row">
            <div class="sub-left">
              <span class="status-dot ${sDot}"></span>
              <span>PID ${s.pid}</span>
              ${s.model?`<span style="color:var(--dim);font-size:10px">${s.model}</span>`:''}
              ${s.max_turns?`<span style="color:var(--dim);font-size:10px">turns:${s.max_turns}</span>`:''}
              <span style="color:var(--dim);font-size:10px">${relTime(s.start_time)}</span>
            </div>
            <div class="sub-right">
              <span style="font-size:10px;color:var(--dim)">CPU ${s.cpu_pct}%</span>
              <span style="font-size:13px;font-weight:700">${s.rss_mb}MB</span>
              <button class="btn-kill" onclick="confirmAction('kill_claude_${s.pid}','서브에이전트 종료 (PID ${s.pid})',\`서브에이전트 PID ${s.pid}을 종료합니다.\n\n메인 세션은 유지됩니다.\n진행 중인 작업이 중단될 수 있습니다.\`)">Kill</button>
            </div>
          </div>`;
        });
        h+='</div>';
      } else {
        h+='<div style="margin-top:8px;font-size:11px;color:var(--dim)">서브에이전트 없음</div>';
      }
      h+='</div>';
    });
  }

  // Zombies
  if(cs.zombies.length){
    h+=`<div class="section" style="color:var(--red)">좀비 세션 — 부모 없는 서브에이전트 (${cs.zombie_count}개)</div>`;
    h+='<div class="zombie-card">';
    if(cs.zombies.length>1){
      const zMb=cs.zombies.reduce((a,z)=>a+z.rss_mb,0);
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)">
        <span style="font-size:12px;color:var(--red)">총 ${cs.zombie_count}개 · ${fmtMem(zMb)}</span>
        <button class="btn-kill-all" onclick="confirmAction('kill_all_zombies','좀비 전체 종료',\`부모 없는 좀비 서브에이전트 ${cs.zombie_count}개를 모두 종료합니다.\n\n부모 세션이 이미 없으므로 안전합니다.\n예상 회수: ~${fmtMem(zMb)}\`)">Kill All Zombies</button>
      </div>`;
    }
    cs.zombies.forEach(z=>{
      h+=`<div class="zombie-row">
        <div style="display:flex;align-items:center;gap:6px;font-size:12px">
          <span style="color:var(--red)">PID ${z.pid}</span>
          <span class="tag" style="background:rgba(240,78,83,.1);color:var(--red)">zombie</span>
          ${z.model?`<span style="color:var(--dim);font-size:10px">${z.model}</span>`:''}
          <span style="color:var(--dim);font-size:10px">ppid:${z.ppid}</span>
          ${z.team!=='unknown'?`<span class="tag" style="background:${tc(z.team)}20;color:${tc(z.team)}">${z.team}</span>`:''}
          <span style="color:var(--dim);font-size:10px">${relTime(z.start_time)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:10px;color:var(--dim)">CPU ${z.cpu_pct}%</span>
          <span style="font-size:13px;font-weight:700;color:var(--red)">${z.rss_mb}MB</span>
          <button class="btn-kill" onclick="confirmAction('kill_claude_${z.pid}','좀비 종료 (PID ${z.pid})',\`좀비 서브에이전트 PID ${z.pid}을 종료합니다.\n\n부모 세션이 이미 없으므로 안전합니다.\`)">Kill</button>
        </div>
      </div>`;
    });
    h+='</div>';
  }

  // No sessions
  if(!cs.trees.length && !cs.zombies.length){
    h+='<div style="text-align:center;padding:40px;color:var(--dim)">Claude 세션이 실행 중이지 않습니다.</div>';
  }

  document.getElementById('p-cs').innerHTML=h;
}

// ─── Data fetching ───
async function fetchFull(){
  const r=await fetch('/api/metrics'); D=await r.json();
  document.getElementById('spec').textContent=`${D.system.chip} · ${D.system.cores} cores · ${D.memory.total_gb}GB · ${D.collect_ms}ms`;
  cpuHist.push(Math.round(D.cpu.user+D.cpu.sys));
  ramHist.push(D.memory.pressure_pct);
  if(cpuHist.length>MAX_HIST) cpuHist.shift();
  if(ramHist.length>MAX_HIST) ramHist.shift();
  document.getElementById('loading').style.display='none';
  renderOV(); renderMA(); renderCS();
}

// 5초 전체 갱신 (중복 방지)
async function autoRefresh(){
  if(fetching) return;
  fetching=true;
  try{ await fetchFull(); }catch(e){}
  finally{ fetching=false; }
}

async function manualRefresh(){
  const btn=document.querySelector('.btn');
  btn.textContent='수집 중...'; btn.style.opacity='.5';
  await fetchFull();
  btn.textContent='Refresh'; btn.style.opacity='1';
}

// ─── Actions: Confirm → Running → Done (single modal) ───
let elapsedTimer=null;
function setPhase(phase){
  document.getElementById('c-phase-confirm').style.display=phase==='confirm'?'':'none';
  document.getElementById('c-phase-running').style.display=phase==='running'?'':'none';
  document.getElementById('c-phase-done').style.display=phase==='done'?'':'none';
}
function confirmAction(id, label, confirmMsg){
  pendingAction=id;
  document.getElementById('c-title').textContent=label;
  // Show/hide sudo password field
  const sudoWrap=document.getElementById('c-sudo-wrap');
  const sudoPw=document.getElementById('c-sudo-pw');
  sudoWrap.style.display=(id==='purge_cache')?'':'none';
  sudoPw.value='';
  if(!confirmMsg){
    document.getElementById('confirm').classList.add('show');
    setPhase('running');
    execConfirmed();
    return;
  }
  document.getElementById('c-body').textContent=confirmMsg;
  document.getElementById('c-go').disabled=false;
  setPhase('confirm');
  document.getElementById('confirm').classList.add('show');
  if(id==='purge_cache') setTimeout(()=>sudoPw.focus(),100);
}
function closeConfirm(){
  document.getElementById('confirm').classList.remove('show');
  pendingAction=null;
  if(elapsedTimer){clearInterval(elapsedTimer);elapsedTimer=null}
}
async function execConfirmed(){
  const id=pendingAction;
  if(!id) return;
  // Transition to running phase (stay in same modal)
  document.getElementById('c-go').disabled=true;
  setPhase('running');
  document.getElementById('c-title').textContent='실행 중...';
  // Elapsed timer
  const startTime=Date.now();
  document.getElementById('c-elapsed').textContent='0초';
  elapsedTimer=setInterval(()=>{
    const sec=Math.round((Date.now()-startTime)/1000);
    document.getElementById('c-elapsed').textContent=sec+'초';
  },500);
  try{
    const body={};
    const sudoPw=document.getElementById('c-sudo-pw').value;
    if(sudoPw) body.password=sudoPw;
    const r=await fetch('/api/action/'+id,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await r.json();
    clearInterval(elapsedTimer);elapsedTimer=null;
    // Transition to done phase
    document.getElementById('c-title').textContent='실행 완료';
    document.getElementById('c-log').textContent=data.logs.join('\n');
    document.getElementById('c-dur').textContent=`실행: ${data.duration_ms}ms`;
    document.getElementById('c-time').textContent=data.metrics.timestamp;
    setPhase('done');
    // Update data + re-render
    D=data.metrics;
    cpuHist.push(Math.round(D.cpu.user+D.cpu.sys));
    ramHist.push(D.memory.pressure_pct);
    renderOV(); renderMA(); renderCS();
  }catch(e){
    clearInterval(elapsedTimer);elapsedTimer=null;
    document.getElementById('c-title').textContent='실행 실패';
    document.getElementById('c-log').textContent=e.message;
    setPhase('done');
  }
}

// ─── Init ───
setInterval(()=>{
  const t=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'Asia/Seoul'});
  document.getElementById('clock').textContent=t+' KST';
},1000);
// Only allow close from the explicit close button — not ESC, not backdrop click
// (confirm phase allows cancel button + ESC; running/done phases only allow button)
function confirmPhaseActive(){return document.getElementById('c-phase-confirm').style.display!=='none'}
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&confirmPhaseActive())closeConfirm()});
document.getElementById('confirm').addEventListener('click',e=>{if(e.target.id==='confirm'&&confirmPhaseActive())closeConfirm()});

// 5초마다 전체 갱신 (모든 탭 실시간)
fetchFull().then(()=>{
  pollTimer=setInterval(autoRefresh, 5000);
});

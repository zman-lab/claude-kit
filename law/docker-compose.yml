services:
  nginx:
    image: law-nginx:latest
    ports:
      - "${LAW_PORT:-7999}:80"
    depends_on:
      - backend
      - frontend
    restart: always

  backend:
    image: law-backend:latest
    environment:
      - CLAUDE_CONFIG_DIR=/root/.claude
      - DATABASE_URL=sqlite+aiosqlite:///data/law.db
      - AI_PROVIDER=cli
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-20250514}
      - CLAUDE_CLI_PATH=/usr/local/bin/claude
      - LAW_API_OC=${LAW_API_OC}
      - ROOT_PATH=/law
      - SKIP_AUTH=${SKIP_AUTH:-true}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-7895}
    volumes:
      - "${CLAUDE_HOME:-~/.claude}:/root/.claude:ro"
      - law-data:/app/data
    restart: always

  frontend:
    image: law-frontend:latest
    environment:
      - NEXT_PUBLIC_API_URL=
    restart: always

  redis:
    image: redis:7-alpine
    restart: always

volumes:
  law-data:
